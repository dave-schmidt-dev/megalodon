<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf-token" content="" />
  <title>Megalodon</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <!-- xterm.js vendored assets — loaded as non-module scripts so window.Terminal
       and window.FitAddon are available to both the legacy dashboard-v92.js IIFE
       and the new v9.4 ES-module components (terminal_pane.js). -->
  <link rel="stylesheet" href="/static/xterm/xterm.css" />
  <script src="/static/xterm/xterm.js"></script>
  <script src="/static/xterm/addon-fit.js"></script>
  <!-- V9 M2 — contract-trace wrapper. No-op unless window.__M9_CONTRACT_TRACE__ is set. -->
  <script src="/static/js/contract-trace.js"></script>
</head>
<body data-control-mode="false" data-last-event-id="">
  <!-- Auth bootstrap: exchanges a bearer token (in `#t=...`) for a session cookie.
       Runs before module scripts so cookie is present before any v9.2 API fetch.
       FIX(bug-1): replaceState preserves current pathname+search instead of "/"
       so deep-linked SPA routes survive the auth handshake. -->
  <script>
    window.__auth_bootstrap__ = (async () => {
      const hash = new URLSearchParams((location.hash || "").replace(/^#/, ""));
      const token = hash.get("t");
      if (!token) return null;
      try {
        const resp = await fetch("/api/v1/auth/exchange", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
          credentials: "same-origin",
        });
        if (!resp.ok) {
          console.warn("[auth] exchange failed", resp.status);
          return null;
        }
        return true;
      } finally {
        // Wipe the token from URL/history/bookmarks but preserve current page.
        history.replaceState(null, "", location.pathname + location.search);
      }
    })();
  </script>
  <noscript>This UI requires JavaScript.</noscript>

  <header role="banner" class="app-header">
    <div class="app-header__left">
      <span class="app-title">Megalodon</span>
      <span class="mission-status" data-testid="mission-status"></span>
    </div>

    <div class="app-header__center">
      <ol class="phase-strip" aria-label="Mission phase">
        <li class="phase-segment" data-testid="phase-segment-INIT"
          title="INIT: Mission bootstrap. Operator configures .mission-config.yaml and launches agents. No lane work begins until phase advances.">INIT</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-PLAN"
          title="PHASE-PLAN: Lanes write their plan for the work. Synchronization barrier — no lane advances to BUILD until operator phase-flips.">PLAN</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-CHALLENGE"
          title="PHASE-CHALLENGE: Lanes review each other's plans and raise objections. A second synchronization barrier before implementation begins.">CHALLENGE</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-BUILD"
          title="PHASE-BUILD: Lanes implement their plans, hold claims, write findings. Main execution phase — most agent activity happens here.">BUILD</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-VERIFY"
          title="PHASE-VERIFY: Tests run, integration checked. Lanes confirm their deliverables meet the spec before advancing.">VERIFY</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-RUN"
          title="PHASE-RUN: Mission output deployed or executed. Operator-supervised; agents may still patch issues found live.">RUN</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-HEAL"
          title="PHASE-HEAL: Post-failure recovery. Lanes diagnose and fix issues that surfaced in VERIFY or RUN.">HEAL</li>
        <li class="phase-segment" data-testid="phase-segment-PHASE-OPERATOR-ACCEPTANCE"
          title="PHASE-OPERATOR-ACCEPTANCE (OP-ACK): Operator reviews final output and signs off. No lane advances to COMPLETE without explicit approval.">OP-ACK</li>
        <li class="phase-segment" data-testid="phase-segment-DRAINING"
          title="DRAINING: Mission winding down. Agents complete in-flight tasks then go idle. No new claims accepted after this point.">DRAINING</li>
        <li class="phase-segment" data-testid="phase-segment-COMPLETE"
          title="COMPLETE: Mission finished. All deliverables written and accepted. Read-only archive state.">COMPLETE</li>
      </ol>
    </div>

    <div class="app-header__right">
      <button
        type="button"
        class="control-mode-toggle"
        data-testid="action-toggle-control-mode"
        role="switch"
        aria-checked="false"
        title="Toggle between Read-only mode (safe, no mutations) and Control mode (enables Reclaim, Phase Flip, and other operator actions that affect agents)."
      >
        <span class="control-mode-toggle__label" data-state="off">🔒 Read-only</span>
        <span class="control-mode-toggle__label" data-state="on">🔓 Control</span>
      </button>
    </div>
  </header>

  <nav role="navigation" aria-label="Pages" class="app-nav">
    <a href="/" data-testid="nav-dashboard">Dashboard</a>
    <a href="/tasks" data-testid="nav-tasks">Tasks</a>
    <a href="/findings" data-testid="nav-findings">Findings</a>
    <a href="/signals" data-testid="nav-signals">Signals</a>
    <a href="/coordination" data-testid="nav-coordination">Coordination</a>
    <a href="/mission" data-testid="nav-mission">Mission</a>
    <a href="/approval-rules" data-testid="nav-approval-rules">Approval Rules</a>
  </nav>

  <main id="app-root" role="main"></main>

  <div id="toast-region" role="status" aria-live="polite"></div>

  <!-- auth.js — shared first-load auth gating + global re-auth modal. Loaded
       FIRST (before sse.js / components) so window.__megalodon_auth__ and the
       re-auth modal exist before any gated request/EventSource can fire. -->
  <script type="module" src="/static/js/auth.js"></script>
  <script type="module" src="/static/js/store.js"></script>
  <script type="module" src="/static/js/sse.js"></script>
  <script type="module" src="/static/js/app.js"></script>
  <!-- terminal_pane component — sets window.createTerminalPane for use by
       both the new ES-module pages (board.js, lane_detail.js) and the legacy
       non-module dashboard-v92.js IIFE below. Must load before dashboard-v92.js. -->
  <script type="module" src="/static/components/terminal_pane.js"></script>
  <!-- v9.2 xterm dashboard — self-contained IIFE; NO-OP unless the server
       sets MEGALODON_V92_DASHBOARD=1 (so /api/v1/config returns v92_dashboard:
       true). Must load AFTER the auth-bootstrap <script> above AND after the
       terminal_pane module above (the defer attribute ensures it runs after
       DOMContentLoaded, by which time the module scripts have executed). -->
  <script defer src="/static/pages/dashboard-v92.js"></script>
</body>
</html>
