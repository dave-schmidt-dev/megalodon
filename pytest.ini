[pytest]
markers =
    unit: pure-function tests, no server, <1s each
    integration: API x filesystem tests, ~5-10s each
    isolated: time-sensitive tests requiring fresh asyncio event-loop state (run via `pytest -p forked -m isolated`)
    nondestructive: tests that touch SIGTERM/SIGKILL only on their own subprocesses (safe to run in any context)
addopts = -ra --strict-markers
filterwarnings =
    # Silence external-library deprecation flood (uvicorn/websockets emit ~150-660
    # DeprecationWarnings per run from their own internals; the asyncio.iscoroutinefunction
    # deprecation floods from test_stimulus_harness.py via starlette/anyio internals).
    # First-party DeprecationWarnings remain visible — only external packages are silenced.
    ignore::DeprecationWarning:uvicorn
    ignore::DeprecationWarning:websockets
    ignore:.*iscoroutinefunction.*:DeprecationWarning
testpaths = scripts/tests ui/tests/unit ui/tests/integration
norecursedirs = docs .archive runs .git node_modules .venv ui/tests/fixtures
