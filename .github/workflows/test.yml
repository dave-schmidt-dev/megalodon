name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # Primary gate: runs on ubuntu-latest only. The previous matrix included
  # macos-latest, which sat perpetually `queued` (no macOS runner available on
  # this repo's plan), so every workflow hung indefinitely and `fail-fast:
  # false` never let it conclude. macOS-specific behaviour (the 104-byte
  # sun_path socket limit) is covered by the test fixtures regardless of runner
  # OS; Linux is sufficient for the gates that protect the product.
  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MEGALODON_KILL_ON_EXIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Verify tmux
        run: tmux -V

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify npm
        run: npm --version

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      # JS unit tier (node:test). Runs the whole ui/tests/unit dir, not just the
      # config loader -- signal_filename_parse (sender_lane parsing) and
      # store_nested_notify have no other coverage anywhere in CI. Node is already
      # set up above for Playwright; no extra install is needed. The quoted glob
      # is required because `node --test <dir>` resolves the dir as a module on
      # Node >=22 instead of discovering test files.
      - name: JS unit tests (node:test)
        run: node --test "ui/tests/unit/**/*.test.js"

      # Use the pyproject `test` extra as the single source of test deps so CI
      # and the local preflight (`uv run --extra test pytest ...`) cannot drift.
      # A hand-maintained `--with` list previously dropped freezegun, breaking
      # collection of test_state_read.py on every push.
      - name: Unit and integration tests
        run: >
          uv run --extra test
          pytest scripts/tests ui/tests/integration ui/tests/unit
          -v -m "not isolated"

      # The isolated marker gates the real-tmux integration tier (test_real_tmux_spawn,
      # test_lane_exit_detected_within_5s, test_spawn_tail_realfile,
      # test_followup_pipe_pane_preserved). These spawn real tmux sessions through the
      # genuine FleetSpawner path -- including the governor preflight + canary self-test
      # -- so the run-dir scripts/ symlink the preflight requires is created by the test
      # fixtures (scripts/tests/conftest.py::link_governor_scripts). tmux is installed
      # and verified above, so this tier actually executes here (not just collects).
      - name: Forked isolation pass (incl. real-tmux tier)
        run: >
          uv run --extra test
          pytest --forked -m isolated
          scripts/tests ui/tests/integration ui/tests/unit
          -v

      - name: Lint
        run: uv run --with 'ruff==0.15.14' ruff check megalodon_ui/ scripts/

      - name: Dead-code scan (vulture)
        run: uv run --with vulture vulture

      - name: Install Playwright browsers (chromium)
        if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: npx playwright install --with-deps chromium

      # Load-bearing Playwright gate. The full config defines 11 projects across
      # chromium + webkit, each spinning its own uvicorn server; running them all
      # under CI never concluded. We gate on the chromium projects that protect
      # the operator-facing surfaces:
      #   - chromium-board: the board (stale/BLOCKED pills, lane rows, safety
      #     rails) plus lane_detail / activity_wall / findings / signals /
      #     mission / tasks / approval_rules pages and the T2.8 stale badge.
      #   - chromium-default: the v9.0 dashboard render + request handlers.
      # webkit (Safari-engine) projects are exercised locally and are NOT a CI
      # blocking gate (see the non-blocking job below). --workers is capped to
      # fit the GitHub runner (the config already drops to 4 under CI; we hold it
      # there explicitly so a single failure can't fan out a server stampede).
      - name: Playwright board e2e (chromium-board)
        if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: >
          npx playwright test
          --config=ui/tests/e2e/playwright.config.ts
          --project=chromium-board
          --workers=2

      - name: Playwright default e2e (chromium-default)
        if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: >
          npx playwright test
          --config=ui/tests/e2e/playwright.config.ts
          --project=chromium-default
          --workers=2

      # Gate on chromium-mutations: test_orchestrator_actions.spec.ts exercises
      # challenge / reclaim / signal mutations via the UI. The project uses
      # workers=1 because specs share mutable server state (STATUS.md appends).
      # Only chromium is needed here — webkit-mutations runs in the non-blocking job.
      - name: Playwright mutations e2e (chromium-mutations)
        if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: >
          npx playwright test
          --config=ui/tests/e2e/playwright.config.ts
          --project=chromium-mutations
          --workers=1

  # Non-blocking WebKit / Safari-engine coverage. Safari users get coverage, but
  # a WebKit-specific flake or the heavier multi-server startup can't wedge the
  # primary gate. `continue-on-error: true` keeps it visible without blocking
  # the merge signal; a generous-but-bounded timeout guarantees it concludes.
  playwright-webkit:
    name: playwright webkit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''

    env:
      MEGALODON_KILL_ON_EXIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install Playwright browsers (webkit)
        run: npx playwright install --with-deps webkit

      - name: Playwright board e2e (webkit-board)
        run: >
          npx playwright test
          --config=ui/tests/e2e/playwright.config.ts
          --project=webkit-board
          --workers=2
