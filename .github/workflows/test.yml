name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      MEGALODON_KILL_ON_EXIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Verify tmux
        run: tmux -V

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify npm
        run: npm --version

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install Node dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      # Use the pyproject `test` extra as the single source of test deps so CI
      # and the local preflight (`uv run --extra test pytest ...`) cannot drift.
      # A hand-maintained `--with` list previously dropped freezegun, breaking
      # collection of test_state_read.py on every push.
      - name: Unit and integration tests
        run: >
          uv run --extra test
          pytest scripts/tests ui/tests/integration ui/tests/unit
          -v -m "not isolated"

      - name: Forked isolation pass
        run: >
          uv run --extra test
          pytest --forked -m isolated
          scripts/tests ui/tests/integration ui/tests/unit
          -v

      - name: Lint
        run: uv run --with 'ruff==0.15.14' ruff check megalodon_ui/ scripts/

      - name: Dead-code scan (vulture)
        run: uv run --with vulture vulture

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux' && hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browsers (macOS)
        if: runner.os == 'macOS' && hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: npx playwright install chromium

      - name: Playwright e2e tests
        if: hashFiles('ui/tests/e2e/playwright.config.ts') != ''
        run: npx playwright test --config=ui/tests/e2e/playwright.config.ts
